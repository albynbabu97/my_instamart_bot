name: Instamart Stock Tracker Daemon

on:
  schedule:
    - cron: '*/15 * * * *'  # Automatically triggers execution every 15 minutes, 24/7
  workflow_dispatch:        # Adds a manual "Run Workflow" trigger button in your GitHub dashboard

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Runtime Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests

    - name: Configure Web Engines (Playwright)
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Execute Tracker Task Script
      env:
        # Links your repository secret vault parameters securely to the local terminal runtime
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python standalone_tracker.py
