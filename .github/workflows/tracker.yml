name: Instamart Stock Tracker Daemon

on:
  schedule:
    - cron: '7,22,37,52 * * * *'  # Background checks every 15 mins
  workflow_dispatch:
    inputs:
      action_type:
        description: 'ADD or CHECK'
        required: true
        default: 'CHECK'
      product_url:
        description: 'Instamart URL'
        required: false
      latitude:
        description: 'Latitude Coordinate'
        required: false
      longitude:
        description: 'Longitude Coordinate'
        required: false

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows GitHub to commit structural updates to watchlist.json

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Clone Code Repository
      uses: actions/checkout@v4

    - name: Set Up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Runtime Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests

    - name: Configure Web Engines (Playwright)
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Execute Tracker Task Script
      run: |
        python standalone_tracker.py \
          "${{ github.event.inputs.action_type }}" \
          "${{ github.event.inputs.product_url }}" \
          "${{ github.event.inputs.latitude }}" \
          "${{ github.event.inputs.longitude }}"

    - name: Commit Watchlist Updates
      run: |
        git config --global user.name "GitHub Actions Automation"
        git config --global user.email "actions@github.com"
        git add watchlist.json || true
        git commit -m "Auto-update watchlist via Control Panel UI" || true
        git push || true
